  <mat-card-header>
    <mat-card-title>
      {{ post.title }}
    </mat-card-title>

    <mat-card-subtitle>
      Por {{ post.author_email }} ·
      {{ post.created_at | date:'mediumDate' }}
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p>
      {{ post.excerpt }}
    </p>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-raised-button color="primary">
      Ver más
    </button>
  </mat-card-actions>
