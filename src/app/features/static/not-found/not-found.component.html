<div class="not-found-wrapper">
  <mat-card class="not-found-card">
    <div class="error-visual">
      <span class="code">404</span>
      <div class="divider"></div>
    </div>

    <mat-card-header>
      <mat-card-title class="post-title">Page Not Found</mat-card-title>
    </mat-card-header>

    <mat-card-content class="post-excerpt">
      <p>
        Oops! It seems you've wandered into an empty post. The content you are looking for
        doesn't exist or has been moved to another team.
      </p>
    </mat-card-content>

    <mat-card-actions class="post-actions-row">
      <button mat-flat-button class="home-btn" routerLink="/posts">
        Back to posts
      </button>
    </mat-card-actions>
  </mat-card>
</div>
