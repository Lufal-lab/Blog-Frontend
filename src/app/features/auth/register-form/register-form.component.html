<div class="container">
  <mat-card class="register-card">
    <h2>User Registration</h2>

    <form [formGroup]="form" (ngSubmit)="register($event)">

      <mat-form-field
        appearance="outline"
        floatLabel="always"
        class="full-width"
        subscriptSizing="dynamic"
      >
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email">
        <mat-error *ngIf="form.get('email')?.hasError('required')">
          Email is required
        </mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">
          Invalid email format
        </mat-error>
        <mat-error *ngIf="form.get('email')?.errors?.['backend']">
          <div *ngFor="let error of form.get('email')?.errors?.['backend']">
            {{ error }}
          </div>
        </mat-error>
      </mat-form-field>

      <mat-form-field
        appearance="outline"
        floatLabel="always"
        class="full-width"
        subscriptSizing="dynamic"
      >
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password">

        <mat-error *ngIf="form.get('password')?.hasError('required')">
          Password is required
        </mat-error>

        <mat-error *ngIf="form.get('password')?.hasError('minlength')">
          Minimum 8 characters required
        </mat-error>

        <mat-error *ngIf="form.get('password')?.errors?.['backend']">
          <div *ngFor="let error of form.get('password')?.errors?.['backend']">
            {{ error }}
          </div>
        </mat-error>
      </mat-form-field>

      <mat-form-field
        appearance="outline"
        floatLabel="always"
        class="full-width"
        subscriptSizing="dynamic"
      >
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword">

        <mat-error *ngIf="form.hasError('passwordMismatch')">
          Passwords do not match
        </mat-error>

        <mat-error *ngIf="form.get('confirmPassword')?.hasError('required')">
          Password is required
        </mat-error>
      </mat-form-field>

      <div class="actions">
        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Submit
        </button>

        <button mat-button type="button" (click)="cancel()">
          Cancel
        </button>
      </div>

      <p class="login-link">
        Have an account?
        <a mat-button color="accent" routerLink="/auth/login">Log in</a>
      </p>

    </form>
  </mat-card>
</div>
