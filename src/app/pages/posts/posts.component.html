<h2>Posts</h2>

<p *ngIf="loading">Cargando posts ...</p>

<p *ngIf="error" style="color: red;">
  {{ error }}
</p>

<div *ngIf="!loading && !error && posts.length > 0">
  <app-post-id
    *ngFor="let post of posts"
    [post]="post"
  >
  </app-post-id>
</div>

<div *ngIf="!loading && !error && posts.length > 0">
<app-pagination
  [next]="pagination.next"
  [previous]="pagination.previous"
  (nextPage)="loadNext()"
  (previousPage)="loadPrevious()"
></app-pagination>
</div>
